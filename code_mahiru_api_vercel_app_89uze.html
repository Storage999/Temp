<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mahiru API's ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0d0b14;
    --surface: #13111e;
    --card:    #1a1628;
    --border:  #2e2545;
    --pink:    #ff6fd8;
    --purple:  #b06cff;
    --lavender:#d4aaff;
    --white:   #f0e8ff;
    --muted:   #7a6e99;
    --glow:    0 0 18px #ff6fd855;
    --glow-strong: 0 0 30px #ff6fd888;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay with animation ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
    animation: grainShift 8s ease-in-out infinite alternate;
  }
  @keyframes grainShift {
    0% { opacity: 0.03; }
    100% { opacity: 0.05; }
  }

  /* ── Gradient blob bg with floating animation ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 {
    width: 500px; height: 500px; background: var(--pink);
    top: -100px; left: -150px;
    opacity: 0.18;
    animation: floatBlob1 12s ease-in-out infinite;
  }
  .blob-2 {
    width: 400px; height: 400px; background: var(--purple);
    bottom: -80px; right: -100px;
    opacity: 0.18;
    animation: floatBlob2 15s ease-in-out infinite;
  }
  .blob-3 {
    width: 300px; height: 300px; background: linear-gradient(135deg, var(--pink), var(--purple));
    top: 50%; left: 50%;
    opacity: 0.1;
    animation: floatBlob3 18s ease-in-out infinite;
  }

  @keyframes floatBlob1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(80px, 60px) scale(1.1); }
    50% { transform: translate(-30px, 100px) scale(0.9); }
    75% { transform: translate(-80px, -40px) scale(1.05); }
  }
  @keyframes floatBlob2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(-60px, -50px) scale(1.15); }
    50% { transform: translate(40px, -80px) scale(0.85); }
    75% { transform: translate(70px, 30px) scale(1.1); }
  }
  @keyframes floatBlob3 {
    0%, 100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
    33% { transform: translate(-30%, -60%) rotate(120deg) scale(1.2); }
    66% { transform: translate(-60%, -30%) rotate(240deg) scale(0.8); }
  }

  /* ── Star particles ── */
  .stars {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: var(--white);
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }

  /* ── Layout ── */
  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  /* ── Header with entrance animation ── */
  header {
    text-align: center;
    padding: 3.5rem 0 2rem;
    animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-divider {
    font-size: .75rem;
    letter-spacing: .15em;
    color: var(--muted);
    margin-bottom: .8rem;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  header h1 {
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--lavender), var(--pink));
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: .5rem;
    animation: gradientShift 4s ease-in-out infinite;
    position: relative;
    display: inline-block;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Glow underline for title */
  header h1::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 60%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--purple), transparent);
    animation: underlinePulse 2s ease-in-out infinite;
  }
  @keyframes underlinePulse {
    0%, 100% { opacity: 0.3; width: 40%; }
    50% { opacity: 1; width: 80%; }
  }

  header p {
    color: var(--muted);
    font-size: .9rem;
    font-family: 'DM Mono', monospace;
    animation: fadeIn 1s 0.3s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
    animation: fadeIn 1s 0.5s ease both;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: .35rem 1.2rem;
    font-size: .78rem;
    font-family: 'DM Mono', monospace;
    color: var(--lavender);
    display: flex; align-items: center; gap: .4rem;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  .stat:hover {
    border-color: var(--pink);
    box-shadow: var(--glow);
    transform: translateY(-2px);
  }
  /* Shine effect on hover */
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,111,216,0.1), transparent);
    transition: left 0.5s;
  }
  .stat:hover::before { left: 100%; }

  .stat span {
    color: var(--pink);
    font-weight: 600;
    animation: countPop 0.5s ease-out;
  }
  @keyframes countPop {
    0% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* ── Search with focus animation ── */
  .search-wrap {
    margin: 2rem 0 1.5rem;
    position: relative;
    animation: fadeIn 1s 0.6s ease both;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .85rem 1.2rem .85rem 3rem;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: .9rem;
    outline: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .search-wrap input:focus {
    border-color: var(--pink);
    box-shadow: var(--glow-strong);
    transform: translateY(-1px);
  }
  .search-wrap input::placeholder {
    color: var(--muted);
    transition: opacity 0.3s;
  }
  .search-wrap input:focus::placeholder { opacity: 0.5; }

  /* Animated search icon */
  .search-wrap::before {
    content: '✦';
    position: absolute;
    left: 1.1rem; top: 50%; transform: translateY(-50%);
    color: var(--pink); font-size: .85rem;
    pointer-events: none;
    animation: spinStar 4s linear infinite;
  }
  @keyframes spinStar {
    0% { transform: translateY(-50%) rotate(0deg); }
    100% { transform: translateY(-50%) rotate(360deg); }
  }
  .search-wrap:focus-within::before {
    animation: spinStar 1s linear infinite;
    color: var(--lavender);
  }

  /* ── Section with staggered animation ── */
  .section {
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .section:nth-child(1) { animation-delay: 0.1s; }
  .section:nth-child(2) { animation-delay: 0.2s; }
  .section:nth-child(3) { animation-delay: 0.3s; }
  .section:nth-child(4) { animation-delay: 0.4s; }
  .section:nth-child(5) { animation-delay: 0.5s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: .7rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: .4rem .9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: inline-flex; align-items: center; gap: .5rem;
    margin-bottom: 1rem;
    transition: all 0.3s;
    cursor: default;
  }
  .section-title:hover {
    border-color: var(--purple);
    color: var(--lavender);
    box-shadow: 0 0 15px rgba(176,108,255,0.2);
  }
  .section-title::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--pink);
    display: block;
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,111,216,0.6); }
    50% { box-shadow: 0 0 0 8px rgba(255,111,216,0); }
  }

  /* ── Command card with hover effects ── */
  .cmd-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.3rem;
    margin-bottom: .7rem;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: .8rem;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }

  /* Subtle gradient border on hover */
  .cmd-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--pink));
    opacity: 0;
    transition: opacity 0.35s;
    z-index: -1;
  }
  .cmd-card:hover::before { opacity: 1; }

  .cmd-card:hover {
    transform: translateX(6px) translateY(-2px);
    box-shadow: 0 10px 30px rgba(255,111,216,0.1);
  }

  .cmd-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--pink);
    font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: .5rem;
    transition: all 0.3s;
  }
  .cmd-name::before {
    content: '/';
    color: var(--purple);
    transition: all 0.3s;
  }
  .cmd-card:hover .cmd-name::before {
    transform: rotate(-10deg);
    color: var(--lavender);
  }

  .cmd-meta {
    font-size: .72rem;
    color: var(--muted);
    margin-top: .25rem;
    display: flex; gap: 1.2rem;
    flex-wrap: wrap;
  }
  .cmd-meta i { font-style: normal; transition: color 0.3s; }
  .cmd-meta i span { color: var(--lavender); transition: color 0.3s; }
  .cmd-card:hover .cmd-meta i span { color: var(--pink); }

  .btn-group { display: flex; gap: .5rem; flex-shrink: 0; }

  .btn {
    padding: .4rem .85rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--lavender);
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    text-decoration: none;
    display: flex; align-items: center; gap: .3rem;
    position: relative;
    overflow: hidden;
  }

  /* Button hover ripple */
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,111,216,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn:hover::after { opacity: 1; }

  .btn:hover {
    border-color: var(--pink);
    color: var(--pink);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255,111,216,0.15);
  }
  .btn:active { transform: scale(0.95); }

  .btn.copy-ok {
    border-color: var(--purple);
    color: var(--purple);
    animation: copyBounce 0.4s ease;
  }
  @keyframes copyBounce {
    0% { transform: scale(1); }
    50% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  /* ── API section ── */
  .apis-header {
    font-size: .7rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2.5rem 0 1rem;
    display: flex; align-items: center; gap: .8rem;
    animation: fadeIn 1s 0.7s ease both;
  }
  .apis-header::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
    animation: lineExtend 1.5s ease-out;
  }
  @keyframes lineExtend {
    from { width: 0; }
    to { width: 100%; }
  }

  .api-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.3rem;
    margin-bottom: .7rem;
    display: flex; justify-content: space-between; align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    animation: fadeUp 0.5s ease both;
    position: relative;
  }
  .api-card:nth-child(2) { animation-delay: 0.1s; }
  .api-card:nth-child(3) { animation-delay: 0.2s; }

  .api-card:hover {
    border-color: var(--purple);
    transform: translateX(6px);
    box-shadow: 0 10px 25px rgba(176,108,255,0.1);
  }

  .api-name {
    font-size: .95rem;
    font-weight: 600;
    color: var(--lavender);
    display: flex; align-items: center; gap: .4rem;
    transition: color 0.3s;
  }
  .api-card:hover .api-name { color: var(--pink); }

  .api-url {
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    color: var(--muted);
    margin-top: .2rem;
    transition: color 0.3s;
    word-break: break-all;
  }

  .badge {
    font-size: .65rem; font-family: 'DM Mono', monospace;
    padding: .2rem .6rem; border-radius: 4px;
    background: #b06cff22; color: var(--purple);
    border: 1px solid var(--purple);
    letter-spacing: .05em;
    animation: badgeGlow 2s ease-in-out infinite;
  }
  @keyframes badgeGlow {
    0%, 100% { box-shadow: 0 0 0 rgba(176,108,255,0); }
    50% { box-shadow: 0 0 10px rgba(176,108,255,0.3); }
  }
  .badge.green {
    background: #2dff8822; color: #2dff88;
    border-color: #2dff88;
    animation: badgeGlowGreen 2s ease-in-out infinite;
  }
  @keyframes badgeGlowGreen {
    0%, 100% { box-shadow: 0 0 0 rgba(45,255,136,0); }
    50% { box-shadow: 0 0 10px rgba(45,255,136,0.3); }
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 2rem 0 0;
    color: var(--muted);
    font-size: .75rem;
    font-family: 'DM Mono', monospace;
    border-top: 1px solid var(--border);
    animation: fadeIn 1s 1s ease both;
  }
  footer span {
    color: var(--pink);
    transition: all 0.3s;
  }
  footer span:hover {
    text-shadow: var(--glow);
    color: var(--lavender);
  }

  /* ── Loading animation ── */
  .loader {
    text-align: center;
    padding: 4rem 0;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
  }
  .loader::after {
    content: ' ✦';
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .3; transform: scale(1.5); }
  }

  /* ── Loading dots ── */
  .loading-dots {
    display: flex; gap: .4rem;
    justify-content: center;
    margin-top: 1rem;
  }
  .loading-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--pink);
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  .err {
    color: #ff4f7b;
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    text-align: center;
    padding: 2rem 0;
    animation: shake 0.5s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

  /* ── Selection ── */
  ::selection {
    background: rgba(176,108,255,0.3);
    color: var(--white);
  }

  @media (max-width: 500px) {
    .cmd-card { grid-template-columns: 1fr; }
    .btn-group { justify-content: flex-start; }
    .stats-bar { gap: 1rem; }
  }
</style>
</head>
<body>

<!-- Animated blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Star particles -->
<div class="stars" id="starsContainer"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-divider">✧ ೃ༄ ──── ୨ 🎀 ୧ ──── ✧ ೃ༄</div>
    <h1>Mahiru API's</h1>
    <p>by MAHIN 🎀 — command store &amp; api hub</p>
    <div class="stats-bar" id="statsBar">
      <div class="stat">⟡ Loading…</div>
    </div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search commands…" oninput="filterCmds()"/>
  </div>

  <!-- Commands (section-grouped) -->
  <div id="cmdStore"><div class="loader">Loading commands<div class="loading-dots"><span></span><span></span><span></span></div></div></div>

  <!-- APIs -->
  <div class="apis-header">Available APIs</div>
  <div id="apiList"><div class="loader">Fetching API status<div class="loading-dots"><span></span><span></span><span></span></div></div></div>

  <!-- Footer -->
  <footer>
    <div style="margin-bottom:.4rem">✧ ೃ༄ ──── ୨ 🧸 ୧ ──── ✧ ೃ༄</div>
    <span>Mahiru Shina</span> bot project · <span>MAHIN</span> · 2026
  </footer>

</div>

<script>
// Generate star particles
(function createStars() {
  const container = document.getElementById('starsContainer');
  const count = 50;
  let html = '';
  for (let i = 0; i < count; i++) {
    const size = Math.random() * 2 + 1;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const dur = Math.random() * 3 + 2;
    const delay = Math.random() * 5;
    html += `<div class="star" style="
      left:${x}%; top:${y}%;
      width:${size}px; height:${size}px;
      --dur:${dur}s; --delay:${delay}s;
    "></div>`;
  }
  container.innerHTML = html;
})();

/* ── State ───────────────────────────────────────────────────────────────── */
let allCmds = []; 

/* ── Fetch helpers ───────────────────────────────────────────────────────── */
async function loadAll() {
  try {
    const [cmdRes, statusRes] = await Promise.all([
      fetch('/commands'),
      fetch('/status')
    ]);

    if (!cmdRes.ok || !statusRes.ok) throw new Error("Server Response Error");

    const cmdData = await cmdRes.json();
    const statusData = await statusRes.json();

    allCmds = cmdData.flat || [];

    // Update Stats with staggered pop-in
    const statsBar = document.getElementById('statsBar');
    statsBar.innerHTML = `
      <div class="stat" style="animation: fadeIn 0.5s ease both;">📦 Commands: <span>${allCmds.length}</span></div>
      <div class="stat" style="animation: fadeIn 0.5s 0.1s ease both;">🔗 APIs: <span>${statusData.total_apis || 0}</span></div>
      <div class="stat" style="animation: fadeIn 0.5s 0.2s ease both;">✨ Status: <span>active</span></div>
    `;

    renderCmds(allCmds);
    renderAPIs(statusData.apis || {});

  } catch(e) {
    console.error("Fetch Error:", e);
    document.getElementById('cmdStore').innerHTML = `<div class="err">Failed to load data from server. <br> <small>${e.message}</small></div>`;
  }
}

/* ── Render commands ─────────────────────────────────────────────────────── */
function renderCmds(list) {
  const container = document.getElementById('cmdStore');
  const cmds = list || allCmds;

  if (!cmds.length) {
    container.innerHTML = '<div class="err">No commands found 🐾</div>';
    return;
  }

  const grouped = {};
  for (const c of cmds) {
    const section = c.section || "📦 Other";
    if (!grouped[section]) grouped[section] = [];
    grouped[section].push(c);
  }

  let html = '';
  let sectionIndex = 0;
  for (const [section, items] of Object.entries(grouped)) {
    html += `<div class="section" style="animation-delay:${sectionIndex * 0.1}s">
      <div class="section-title">${section}</div>`;
    for (const c of items) {
      const codeUrl = `/commands/${c.cmd}/code`;
      html += `
      <div class="cmd-card">
        <div>
          <div class="cmd-name">${c.cmd}</div>
          <div class="cmd-meta">
            <i>✍️ <span>${c.author || 'MAHIN 🎀'}</span></i>
            <i>📁 <span>${section}</span></i>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn" onclick="copyRaw('${c.cmd}', this)">⧉ Copy</button>
          <a class="btn" href="${codeUrl}" target="_blank">↗ Raw</a>
        </div>
      </div>`;
    }
    html += `</div>`;
    sectionIndex++;
  }
  container.innerHTML = html;
}

/* ── Render APIs Dynamically ────────────────────────────────────────────── */
function renderAPIs(apis) {
  const container = document.getElementById('apiList');
  let html = '';

  for (const [key, url] of Object.entries(apis)) {
    html += `
    <div class="api-card">
      <div>
        <div class="api-name">${key.toUpperCase()} API <span class="badge">Live</span></div>
        <div class="api-url">${url}</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <a class="btn" href="/${key}/" target="_blank">↗ Use Proxy</a>
        <button class="btn" onclick="copyCurl('${key}')">⟡ cURL</button>
      </div>
    </div>`;
  }
  container.innerHTML = html || '<div class="err">No APIs configured</div>';
}

/* ── Actions ─────────────────────────────────────────────────────────────── */
async function copyRaw(name, btn) {
  try {
    btn.textContent = '...';
    const r = await fetch(`/commands/${name}/code`);
    const text = await r.text();
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied';
    btn.classList.add('copy-ok');
    setTimeout(() => {
      btn.textContent = '⧉ Copy';
      btn.classList.remove('copy-ok');
    }, 2000);
  } catch (err) {
    btn.textContent = '✗ Error';
    btn.style.color = '#ff4f7b';
    setTimeout(() => {
      btn.textContent = '⧉ Copy';
      btn.style.color = '';
    }, 1500);
  }
}

async function copyCurl(key) {
  const host = window.location.origin;
  const curl = `curl "${host}/${key}/endpoint?query=hello"`;
  try {
    await navigator.clipboard.writeText(curl);
    // Show toast instead of alert for better UX
    showToast('✓ cURL example copied!');
  } catch {
    alert("cURL example copied to clipboard!");
  }
}

// Toast notification
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--card); color: var(--pink); border: 1px solid var(--pink);
      padding: .6rem 1.5rem; border-radius: 50px; font-family: 'DM Mono', monospace;
      font-size: .8rem; z-index: 999; opacity: 0; transition: all 0.3s;
      pointer-events: none; box-shadow: var(--glow);
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(-10px)';
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(0)';
  }, 2000);
}

function filterCmds() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderCmds(allCmds); return; }
  renderCmds(allCmds.filter(c =>
    c.cmd.toLowerCase().includes(q) ||
    (c.author || '').toLowerCase().includes(q) ||
    (c.section || '').toLowerCase().includes(q)
  ));
}

/* ── Init ────────────────────────────────────────────────────────────────── */
loadAll();
